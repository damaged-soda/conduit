# 订阅来源清单（结构化）。url / headers 这类敏感值用 *_ref 指向外部 secret store，
# 不写明文、不进 git；conduit 只认这个 schema，不认来源。
subscriptions:
  - id: vendor-a
    type: auto             # parser hint: auto | clash | uri | base64
    url_ref: "subs/vendor-a/url"
    headers_ref: null      # 需要鉴权头时指向 secret
    fetch_interval: "30m"
    source_trust: normal   # 可选，先 later：normal | low
