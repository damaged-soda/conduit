# 调用方提供的目标主机清单 + per-target overlay（mihomo 数据面差异）。
# conduit 用占位名，不认识具体主机；真值由调用方（如 fleet）按此 schema 填。
# 只放渲染需要的字段。「怎么送达 / 谁推谁拉」不在 conduit 职责内，别写这里。
targets:
  - name: host-a
    listen: "127.0.0.1:7890"
    controller:
      bind: "127.0.0.1:9090"           # mihomo external-controller
      secret_ref: "host-a/controller"  # 指向外部 secret store，不写明文
    tun:
      enable: true
      route_exclude: []                # 渲染时合入 direct-list 的 ip_cidr
    dns:
      fake_ip: true                    # 用 fake-ip 时，direct 域名会被渲进放行名单
  - name: host-b
    listen: "0.0.0.0:7890"
    controller:
      bind: "127.0.0.1:9090"
      secret_ref: "host-b/controller"
    tun:
      enable: false
    dns:
      fake_ip: true
