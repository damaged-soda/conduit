# 测试夹具：一份「正确的」最小 mihomo 配置，给 golden 不变量测试用。
# 代表 render() 对一个「开 TUN + fake-ip」的 target 应当产出的形态。
# 不是真要连的配置，上游 server 是占位。
mixed-port: 7890
mode: rule

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.example-internal"        # direct 域名必须在此放行，否则被解析成假 IP
  nameserver:
    - https://1.1.1.1/dns-query

tun:
  enable: true
  stack: system
  route-exclude-address:
    - 10.0.0.0/8                  # direct CIDR 必须从 TUN 路由排除

proxies:
  - { name: up-a, type: socks5, server: placeholder-a, port: 1080 }
  - { name: up-b, type: socks5, server: placeholder-b, port: 1080 }

proxy-groups:
  - name: PROXY
    type: fallback
    proxies: [up-a, up-b]
    url: http://www.gstatic.com/generate_204
    interval: 60
    timeout: 2000
    lazy: false

rules:
  # direct-list：必须最高优先级直连（放在最前）
  - DOMAIN-SUFFIX,example-internal,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  # 其余走代理
  - MATCH,PROXY
