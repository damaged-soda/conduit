# conduit 集成测试台（本地 + GitHub PR CI）：用 render 的真实产出（gen_config.py → mihomo.generated.yaml）
# 跑 mihomo，在隔离网络里断言路由语义。代理模式（不开 TUN），GitHub runner / 本地 Docker 都能跑。
#
# 拓扑保证（结构化，不靠看返回串）：
#   - echo-proxied 只在 backnet：mihomo 不在 backnet，必须经 upstream → 域名目标走代理才到。
#   - echo-direct  只在 directnet 的私网 IP 172.28.0.5：upstream 到不了 → 只有命中 render 的私网兜底直连才到。
#     （若 render 哪天又把私网代理了 → 这条 curl 失败 → rule#0 回归被抓到。）
name: conduit-it

services:
  mihomo:
    image: metacubex/mihomo:latest
    command: ["-d", "/cfg"]
    volumes:
      - ./mihomo.generated.yaml:/cfg/config.yaml:ro
    networks: [directnet, frontnet]

  upstream-a:
    image: ginuerzh/gost:latest
    command: ["-L", "socks5://:1080"]
    networks: [frontnet, backnet]
  upstream-b:
    image: ginuerzh/gost:latest
    command: ["-L", "socks5://:1080"]
    networks: [frontnet, backnet]

  echo-health:
    image: hashicorp/http-echo:latest
    command: ["-text=ok", "-listen=:5678"]
    networks: [backnet]
  echo-proxied:
    image: hashicorp/http-echo:latest
    command: ["-text=proxied", "-listen=:5678"]
    networks: [backnet]
  echo-direct:
    image: hashicorp/http-echo:latest
    command: ["-text=direct", "-listen=:5678"]
    networks:
      directnet:
        ipv4_address: 172.28.0.5      # 私网 IP，命中 render 的 172.16/12 兜底直连
  tester:
    image: curlimages/curl:latest
    entrypoint: ["sleep", "infinity"]
    depends_on: [mihomo, upstream-a, upstream-b, echo-health, echo-proxied, echo-direct]
    networks: [directnet]

networks:
  directnet:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/16       # 钉死，保证 echo-direct 的 172.28.0.5 在私网兜底范围内
  frontnet: { driver: bridge, internal: true }
  backnet: { driver: bridge, internal: true }
