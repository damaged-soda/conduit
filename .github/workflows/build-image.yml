# 推 main / 打 v* tag / 手动触发 → build conduit-service 镜像并推到 GHCR。
# 公开仓 + 公开 package ⇒ rig 直接 `docker pull` 零认证。镜像不含 secrets（见 .dockerignore）。
#
# Tag 语义：
#   latest  —— 每次合 main 都动（最新开发态）。
#   release —— 只在打 v* tag 时移动（固定的「已发布」指针）。rig 的部署 reconciler
#              只跟踪 :release，所以日常合 main 不会触发重部署，只有打版本 tag 才会。
#   v*      —— 不可变的版本镜像；sha-xxxx —— 每个 commit 一个不可变镜像。
name: build-image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "value=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "value=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # 关掉 auto-latest：否则打 v* tag（甚至给旧 commit 打）也会移动 latest，导致 rig 回滚。
          flavor: latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=release,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=tag
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CONDUIT_VERSION=${{ steps.version.outputs.value }}
